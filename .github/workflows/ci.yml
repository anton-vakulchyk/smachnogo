# Backend CI: test → build on every push/PR; deploys are manual
# (workflow_dispatch) until the repo has AWS OIDC wired.
#
# Required repository setup before deploys work (Anton):
#   1. AWS IAM OIDC identity provider for GitHub Actions in account
#      920071567477 + a deploy role trusting this repo
#      (mirror the permissions of the existing smachnogo-deploy role).
#   2. Repo secret AWS_DEPLOY_ROLE_ARN = that role's ARN.
# iOS builds need a macOS runner + signing assets — deliberately out of
# scope for v1 CI (Release builds happen in Xcode until TestFlight CI pays
# for itself).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Environment to deploy after tests pass"
        type: choice
        options: [none, dev, prod]
        default: none

permissions:
  contents: read
  id-token: write # OIDC for AWS

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/pkg/go.sum
      - name: Unit tests
        run: go test ./...
        working-directory: backend/pkg
        env:
          GOWORK: off
      - name: Vet all modules
        run: |
          for mod in pkg functions/api functions/workers/scanworker functions/presignup tests; do
            (cd "$mod" && GOWORK=off go vet ./...)
          done

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/pkg/go.sum
      - name: Build Lambda zips (one SHA, all functions)
        run: ./scripts/build.sh
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: backend/bin/*.zip
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_env != 'none'
    environment: ${{ inputs.deploy_env }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/pkg/go.sum
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy
        run: ./scripts/deploy.sh --env "${{ inputs.deploy_env }}"
        working-directory: backend
