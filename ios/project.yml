name: Smachnogo
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Explicit scheme so Debug runs carry the local StoreKit configuration —
# sandbox-free purchase testing in the simulator (products mirror ASC).
schemes:
  Smachnogo:
    build:
      targets:
        Smachnogo: all
    run:
      config: Debug
      storeKitConfiguration: StoreKit/Smachnogo.storekit
    archive:
      config: Release

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

targets:
  Smachnogo:
    type: application
    platform: iOS
    sources:
      - Smachnogo
    entitlements:
      path: Smachnogo/Smachnogo.entitlements
      properties:
        # Requires a paid Apple Developer team for device builds; simulator
        # builds sign-to-run-locally. See docs/appstore-readiness.md.
        com.apple.developer.applesignin: [Default]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.smachnogo.ios
        TARGETED_DEVICE_FAMILY: "1" # iPhone-only v1 (no iPad screenshots/review surface)
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Smachnogo photographs your meal to estimate its calories and nutrition."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Pick an existing photo of your meal to log it — for example one you took earlier today."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CP598M5SUG # Anton Vakulchyk — device builds + SIWA signing
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: smachnogo
    info:
      path: Smachnogo/Info.plist
      properties:
        APIBaseURL: $(API_BASE_URL)
        APIBearerToken: $(API_BEARER_TOKEN)
        CognitoRegion: $(COGNITO_REGION)
        CognitoClientID: $(COGNITO_CLIENT_ID)
        CognitoDevUsername: $(COGNITO_DEV_USERNAME)
        CognitoDevPassword: $(COGNITO_DEV_PASSWORD)
        ITSAppUsesNonExemptEncryption: false
